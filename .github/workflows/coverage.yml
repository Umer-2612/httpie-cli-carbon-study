name: Coverage

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - 'experiment/**'
    paths:
      - .github/workflows/coverage.yml
      - httpie/**/*.py
      - setup.*
      - tests/**/*.py
  pull_request:
    paths:
      - .github/workflows/coverage.yml
      - httpie/**/*.py
      - setup.*
      - tests/**/*.py
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger (e.g., research run C2)'
        required: false
        default: 'Manual research run'

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Eco-CI Start Measurement
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
        continue-on-error: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Eco-CI — checkout measurement
        if: always()
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'checkout'
        continue-on-error: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: setup.cfg

      - name: Install dependencies
        run: make install

      - name: Eco-CI — dependency installation measurement
        if: always()
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dependency-installation'
        continue-on-error: true

      - name: Run tests with coverage
        run: make test-cover
        continue-on-error: true

      - name: Eco-CI — coverage measurement
        if: always()
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'coverage'
        continue-on-error: true

      - name: Upload to Codecov
        run: make codecov-upload
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_REPO_TOKEN }}
        continue-on-error: true

      - name: Test distribution build
        run: make test-dist
        continue-on-error: true

      - name: Eco-CI — dist-test measurement
        if: always()
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: 'dist-test'
        continue-on-error: true

      - name: Eco-CI — display results
        if: always()
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          json-output: true
        continue-on-error: true

      - name: Upload Eco-CI results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eco-ci-results-coverage
          path: /tmp/eco-ci/
          retention-days: 30
